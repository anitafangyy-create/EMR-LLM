name: 自动解压 ZIP 文件

on:
  push:
    paths:
      - '**.zip'
  workflow_dispatch:

jobs:
  unzip-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 解压文件
        run: |
          echo "🔍 正在查找所有 .zip 文件..."
          find . -name "*.zip" -type f | while read zipfile; do
            echo "📦 正在解压: $zipfile"
            unzip -o "$zipfile" -d "$(dirname "$zipfile")"
            echo "🗑️  删除原压缩包: $zipfile"
            rm "$zipfile"
          done
          echo "✅ 解压完成。"
      
      - name: 提交并推送更改
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 自动解压 ZIP 文件"
          git push
